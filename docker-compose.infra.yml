# ╔══════════════════════════════════════════════════════════════════════════════════╗
# ║                        NESTFY — Infrastructure Layer                           ║
# ║                                                                                ║
# ║  Data Tier: PostgreSQL (relational) + MongoDB (document)                       ║
# ║  Cache Tier: Redis (session store + pub/sub + caching)                         ║
# ║  Event Tier: Apache Kafka (KRaft mode — no Zookeeper dependency)               ║
# ║                                                                                ║
# ║  All services are attached to the external "Nestfy-network" bridge network.    ║
# ║  Volumes use named volumes for data persistence across restarts.               ║
# ╚══════════════════════════════════════════════════════════════════════════════════╝

services:

  # ─────────────────────────────────────────────────────────────
  # PostgreSQL 17 — Relational OLTP (JPA / Hibernate target)
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: nestfy-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - nestfy_postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - Nestfy-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ─────────────────────────────────────────────────────────────
  # MongoDB 8 — Document Store (Spring Data MongoDB target)
  # ─────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:8
    container_name: nestfy-mongodb
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - nestfy_mongo_data:/data/db
      - nestfy_mongo_config:/data/configdb
      - ./infra/mongo/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - Nestfy-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ─────────────────────────────────────────────────────────────
  # Redis 7 — Cache + Session Store + Pub/Sub
  # ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nestfy-redis
    restart: unless-stopped
    env_file: .env
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 60 1000
      --tcp-backlog 511
      --hz 10
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - nestfy_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - Nestfy-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ─────────────────────────────────────────────────────────────
  # Apache Kafka 4.0 — KRaft Mode (Zookeeper-free)
  # Single combined controller+broker for development.
  # ─────────────────────────────────────────────────────────────
  kafka:
    image: apache/kafka:4.0.0
    container_name: nestfy-kafka
    restart: unless-stopped
    env_file: .env
    environment:
      # KRaft combined mode — node acts as both controller and broker
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:${KAFKA_CONTROLLER_PORT:-9093}
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Cluster
      KAFKA_CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # Performance tuning
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
    ports:
      - "${KAFKA_BROKER_PORT:-9092}:9092"
      - "29092:29092"
    volumes:
      - nestfy_kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - Nestfy-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.5"

# ─────────────────────────────────────────────────────────────
# Named Volumes — Persistent data across container lifecycles
# ─────────────────────────────────────────────────────────────
volumes:
  nestfy_postgres_data:
    driver: local
    name: nestfy_postgres_data
  nestfy_mongo_data:
    driver: local
    name: nestfy_mongo_data
  nestfy_mongo_config:
    driver: local
    name: nestfy_mongo_config
  nestfy_redis_data:
    driver: local
    name: nestfy_redis_data
  nestfy_kafka_data:
    driver: local
    name: nestfy_kafka_data

# ─────────────────────────────────────────────────────────────
# Network — External bridge shared across all compose files
# ─────────────────────────────────────────────────────────────
networks:
  Nestfy-network:
    external: true
    name: Nestfy-network
