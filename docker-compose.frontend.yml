# ╔══════════════════════════════════════════════════════════════════════════════════╗
# ║                         NESTFY — Frontend Layer                                ║
# ║                                                                                ║
# ║  Next.js 16 — Multi-stage Docker build (standalone output)                     ║
# ║  Depends on: Backend (API proxy target)                                        ║
# ║                                                                                ║
# ║  Network: Nestfy-network (external bridge)                                     ║
# ╚══════════════════════════════════════════════════════════════════════════════════╝

services:

  # ─────────────────────────────────────────────────────────────
  # Next.js Frontend — Multi-stage Node 22 build
  # ─────────────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/crazyasura/nestfy-4-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_VERSION: 22
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8080}
    container_name: nestfy-frontend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8080}
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
        required: true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - Nestfy-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

# ─────────────────────────────────────────────────────────────
# Network — External bridge (created by infra layer)
# ─────────────────────────────────────────────────────────────
networks:
  Nestfy-network:
    external: true
    name: Nestfy-network
