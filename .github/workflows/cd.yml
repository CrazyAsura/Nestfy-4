# ╔══════════════════════════════════════════════════════════════════════════════════╗
# ║                  NESTFY — Continuous Integration & Delivery                    ║
# ║                                                                                ║
# ║  Flow:                                                                         ║
# ║    1. Lint & Test (Validate Backend and Frontend independently)                 ║
# ║    2. Build & Push (Multi-arch Docker images to GitHub Container Registry)       ║
# ║    3. Deploy (Optional: Updates compose files and triggers deploy on remote VM) ║
# ╚══════════════════════════════════════════════════════════════════════════════════╝

name: Nestfy CD Pipeline

on:
  push:
    branches: [ main, master, production ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository }}-backend
  FRONTEND_IMAGE_NAME: ${{ github.repository }}-frontend

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Validate & Test Backend (Spring Boot)
  # ─────────────────────────────────────────────────────────────
  backend-ci:
    name: Backend CI (Java 21)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Create schema placeholder
        run: mkdir -p backend/src/main/resources/graphql-client && touch backend/src/main/resources/graphql-client/.gitkeep

      - name: Build and run unit tests
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw clean test

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Validate & Test Frontend (Next.js)
  # ─────────────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend CI (Next.js)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Linter
        run: |
          cd frontend
          npm run lint

      - name: Test Build (next build)
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

  # ─────────────────────────────────────────────────────────────
  # JOB 3 — Docker Build & Push (CD Stage)
  # Runs only on push to target branches (merge to main)
  # ─────────────────────────────────────────────────────────────
  docker-publish:
    name: Docker Build & Publish (GHCR)
    needs: [backend-ci, frontend-ci]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ─── Backend Image ───
      - name: Extract metadata for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ id.meta-backend.outputs.tags }}
          labels: ${{ id.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── Frontend Image ───
      - name: Extract metadata for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ id.meta-frontend.outputs.tags }}
          labels: ${{ id.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  # JOB 4 — Automated Deployment (VPS target via SSH)
  # Triggered after images are successfully published.
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    needs: docker-publish
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Execute deployment commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            cd /opt/nestfy
            
            # Pull latest version of compose files and .env
            git pull origin main
            
            # Login to registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
            
            # Pull latest built images
            docker compose -f docker-compose.infra.yml -f docker-compose.backend.yml -f docker-compose.frontend.yml pull
            
            # Recreate containers without downtime (using rolling release logic where possible)
            docker compose -f docker-compose.infra.yml -f docker-compose.backend.yml -f docker-compose.frontend.yml up -d --remove-orphans
            
            # Prune obsolete layers
            docker image prune -f
